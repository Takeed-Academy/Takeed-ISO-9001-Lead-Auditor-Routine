<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Certification readiness — Stage 1 and Stage 2</text><text x="70" y="118" class="subtitle" text-anchor="start">Prepare evidence for document review, site audit and follow-up closure.</text><rect x="130" y="230" width="270" height="170" rx="16" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="130" y="230" width="270" height="48" rx="16" fill="#092B45"/><text x="265" y="263" class="head" text-anchor="middle">Stage 1</text><text x="152" y="320" class="boxTitle" text-anchor="start">Readiness and document review</text><text x="152" y="356" class="boxText" text-anchor="start">Output: audit-ready evidence pack</text><path d="M400 315 L450 315" stroke="#6B7785" stroke-width="4" marker-end="url(#arrow)"/><rect x="460" y="230" width="270" height="170" rx="16" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="460" y="230" width="270" height="48" rx="16" fill="#2C7A7B"/><text x="595" y="263" class="head" text-anchor="middle">Stage 2</text><text x="482" y="320" class="boxTitle" text-anchor="start">Implementation and effectiveness audit</text><text x="482" y="356" class="boxText" text-anchor="start">Output: audit-ready evidence pack</text><path d="M730 315 L780 315" stroke="#6B7785" stroke-width="4" marker-end="url(#arrow)"/><rect x="790" y="230" width="270" height="170" rx="16" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="790" y="230" width="270" height="48" rx="16" fill="#A73A49"/><text x="925" y="263" class="head" text-anchor="middle">Closure</text><text x="812" y="320" class="boxTitle" text-anchor="start">Nonconformity action and verification</text><text x="812" y="356" class="boxText" text-anchor="start">Output: audit-ready evidence pack</text>
