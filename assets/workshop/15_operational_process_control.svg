<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Operational process control</text><text x="70" y="118" class="subtitle" text-anchor="start">Audit how product/service requirements are planned, controlled and delivered.</text><rect x="80" y="270" width="175" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="98" y="310" class="boxTitle" text-anchor="start">Requirements</text><text x="98" y="342" class="boxText" text-anchor="start">Customer and regulatory needs</text><path d="M258 322 L292 322" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="300" y="270" width="175" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="318" y="310" class="boxTitle" text-anchor="start">Controls</text><text x="318" y="342" class="boxText" text-anchor="start">Criteria, resources, methods</text><path d="M478 322 L512 322" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="520" y="270" width="175" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="538" y="310" class="boxTitle" text-anchor="start">Delivery</text><text x="538" y="342" class="boxText" text-anchor="start">Service or product output</text><path d="M698 322 L732 322" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="740" y="270" width="175" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="758" y="310" class="boxTitle" text-anchor="start">Evidence</text><text x="758" y="342" class="boxText" text-anchor="start">Records, KPIs, checks</text><path d="M918 322 L952 322" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="960" y="270" width="175" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="978" y="310" class="boxTitle" text-anchor="start">Change</text><text x="978" y="342" class="boxText" text-anchor="start">Controlled updates</text>
