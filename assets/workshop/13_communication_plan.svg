<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
  <defs>
    <style><![CDATA[
      .title{font-family:Inter,Arial,sans-serif;font-size:36px;font-weight:800;fill:#092B45;letter-spacing:.3px}
      .subtitle{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#6B7785}
      .label{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#1A2A3A}
      .small{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#6B7785}
      .head{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:white;letter-spacing:.8px}
      .boxTitle{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:800;fill:#092B45}
      .boxText{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#1A2A3A}
      .num{font-family:Georgia,serif;font-size:28px;font-weight:700;fill:white}
    ]]></style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1B2B" flood-opacity="0.16"/></filter>
    <linearGradient id="cover" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#092B45" offset="0"/><stop stop-color="#123C5D" offset="0.6"/><stop stop-color="#0B2F4C" offset="1"/></linearGradient>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#8E4D9F" offset="0"/><stop stop-color="#0E8C87" offset="1"/></linearGradient>
  </defs>
<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Communication plan</text><text x="70" y="118" class="subtitle" text-anchor="start">Determine what to communicate, when, with whom and how.</text><circle cx="155" cy="250" r="58" fill="#092B45"/><text x="155" y="245" class="head" text-anchor="middle">What</text><text x="155" y="272" class="small" fill="white" text-anchor="middle">Quality message</text><circle cx="365" cy="250" r="58" fill="#2F5D7C"/><text x="365" y="245" class="head" text-anchor="middle">When</text><text x="365" y="272" class="small" fill="white" text-anchor="middle">Timing / frequency</text><circle cx="575" cy="250" r="58" fill="#2C7A7B"/><text x="575" y="245" class="head" text-anchor="middle">With whom</text><text x="575" y="272" class="small" fill="white" text-anchor="middle">Audience</text><circle cx="785" cy="250" r="58" fill="#B89A25"/><text x="785" y="245" class="head" text-anchor="middle">How</text><text x="785" y="272" class="small" fill="white" text-anchor="middle">Channel</text><circle cx="995" cy="250" r="58" fill="#A73A49"/><text x="995" y="245" class="head" text-anchor="middle">Owner</text><text x="995" y="272" class="small" fill="white" text-anchor="middle">Accountability</text>
</svg>