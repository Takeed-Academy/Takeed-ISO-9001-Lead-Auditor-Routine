<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
  <defs>
    <style><![CDATA[
      .title{font-family:Inter,Arial,sans-serif;font-size:36px;font-weight:800;fill:#092B45;letter-spacing:.3px}
      .subtitle{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#6B7785}
      .label{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#1A2A3A}
      .small{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#6B7785}
      .head{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:white;letter-spacing:.8px}
      .boxTitle{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:800;fill:#092B45}
      .boxText{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#1A2A3A}
      .num{font-family:Georgia,serif;font-size:28px;font-weight:700;fill:white}
    ]]></style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1B2B" flood-opacity="0.16"/></filter>
    <linearGradient id="cover" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#092B45" offset="0"/><stop stop-color="#123C5D" offset="0.6"/><stop stop-color="#0B2F4C" offset="1"/></linearGradient>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#8E4D9F" offset="0"/><stop stop-color="#0E8C87" offset="1"/></linearGradient>
  </defs>
<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Risk and opportunity prioritisation</text><text x="70" y="118" class="subtitle" text-anchor="start">Use impact and likelihood to decide audit focus and improvement priority.</text><rect x="200" y="185" width="760" height="390" rx="6" fill="white" stroke="#C9D1DC" /><line x1="580.0" y1="185" x2="580.0" y2="575" stroke="#C9D1DC" stroke-width="2"/><line x1="200" y1="380.0" x2="960" y2="380.0" stroke="#C9D1DC" stroke-width="2"/><rect x="240" y="435.0" width="300" height="105" rx="12" fill="#E8F1E5" stroke="none" /><text x="260" y="475.0" class="boxTitle" text-anchor="start">Monitor</text><text x="260" y="503.0" class="boxText" text-anchor="start">Low likelihood · low impact</text><rect x="620.0" y="435.0" width="300" height="105" rx="12" fill="#F6EFCF" stroke="none" /><text x="640.0" y="475.0" class="boxTitle" text-anchor="start">Control</text><text x="640.0" y="503.0" class="boxText" text-anchor="start">High likelihood · low impact</text><rect x="240" y="240" width="300" height="105" rx="12" fill="#E9EEF8" stroke="none" /><text x="260" y="280" class="boxTitle" text-anchor="start">Prepare</text><text x="260" y="308" class="boxText" text-anchor="start">Low likelihood · high impact</text><rect x="620.0" y="240" width="300" height="105" rx="12" fill="#F3E6E8" stroke="none" /><text x="640.0" y="280" class="boxTitle" text-anchor="start">Act now</text><text x="640.0" y="308" class="boxText" text-anchor="start">High likelihood · high impact</text><text x="550" y="605" class="label" text-anchor="middle">Likelihood →</text><text x="150" y="385" class="label" transform="rotate(-90 150 385)" text-anchor="middle">Impact →</text>
</svg>