<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">External context — PESTEL for QMS</text><text x="70" y="118" class="subtitle" text-anchor="start">Scan external factors that may affect quality performance and audit risk.</text><rect x="90" y="190" width="300" height="130" rx="16" fill="#F8FAFC" stroke="#D6DDE6" /><circle cx="130" cy="232" r="24" fill="#092B45"/><text x="130" y="240" class="head" text-anchor="middle">P</text><text x="170" y="232" class="boxTitle" text-anchor="start">Political</text><text x="170" y="262" class="boxText" text-anchor="start">Regulators, public policy</text><rect x="440" y="190" width="300" height="130" rx="16" fill="#F8FAFC" stroke="#D6DDE6" /><circle cx="480" cy="232" r="24" fill="#2F5D7C"/><text x="480" y="240" class="head" text-anchor="middle">E</text><text x="520" y="232" class="boxTitle" text-anchor="start">Economic</text><text x="520" y="262" class="boxText" text-anchor="start">Cost of poor quality</text><rect x="790" y="190" width="300" height="130" rx="16" fill="#F8FAFC" stroke="#D6DDE6" /><circle cx="830" cy="232" r="24" fill="#2C7A7B"/><text x="830" y="240" class="head" text-anchor="middle">S</text><text x="870" y="232" class="boxTitle" text-anchor="start">Social</text><text x="870" y="262" class="boxText" text-anchor="start">Customer expectations</text><rect x="90" y="380" width="300" height="130" rx="16" fill="#F8FAFC" stroke="#D6DDE6" /><circle cx="130" cy="422" r="24" fill="#5B8C5A"/><text x="130" y="430" class="head" text-anchor="middle">T</text><text x="170" y="422" class="boxTitle" text-anchor="start">Technological</text><text x="170" y="452" class="boxText" text-anchor="start">Systems and automation</text><rect x="440" y="380" width="300" height="130" rx="16" fill="#F8FAFC" stroke="#D6DDE6" /><circle cx="480" cy="422" r="24" fill="#B89A25"/><text x="480" y="430" class="head" text-anchor="middle">E</text><text x="520" y="422" class="boxTitle" text-anchor="start">Environmental</text><text x="520" y="452" class="boxText" text-anchor="start">Continuity and facilities</text><rect x="790" y="380" width="300" height="130" rx="16" fill="#F8FAFC" stroke="#D6DDE6" /><circle cx="830" cy="422" r="24" fill="#A73A49"/><text x="830" y="430" class="head" text-anchor="middle">L</text><text x="870" y="422" class="boxTitle" text-anchor="start">Legal</text><text x="870" y="452" class="boxText" text-anchor="start">Contracts and compliance</text>
