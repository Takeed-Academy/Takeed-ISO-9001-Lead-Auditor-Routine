<rect x="28" y="28" width="1144" height="619" rx="18" fill="white" stroke="#CDD5DF" filter="url(#shadow)"/><text x="70" y="90" class="title" text-anchor="start">How to use this workshop book</text><text x="70" y="122" class="subtitle" text-anchor="start">A practical sequence aligned with ISO 9001:2015 Lead Auditor learning outcomes.</text><circle cx="138" cy="230" r="48" fill="#092B45"/><text x="138" y="240" class="num" text-anchor="middle">1</text><text x="90" y="315" class="boxTitle" text-anchor="start">Read brief</text><text x="90" y="342" class="boxText" text-anchor="start">Understand the workshop aim</text><path d="M196 230 L270 230" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><circle cx="354" cy="230" r="48" fill="#2F5D7C"/><text x="354" y="240" class="num" text-anchor="middle">2</text><text x="306" y="315" class="boxTitle" text-anchor="start">Analyze case</text><text x="306" y="342" class="boxText" text-anchor="start">Apply NileTrust evidence</text><path d="M412 230 L486 230" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><circle cx="570" cy="230" r="48" fill="#2C7A7B"/><text x="570" y="240" class="num" text-anchor="middle">3</text><text x="522" y="315" class="boxTitle" text-anchor="start">Complete template</text><text x="522" y="342" class="boxText" text-anchor="start">Write audit-ready outputs</text><path d="M628 230 L702 230" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><circle cx="786" cy="230" r="48" fill="#B89A25"/><text x="786" y="240" class="num" text-anchor="middle">4</text><text x="738" y="315" class="boxTitle" text-anchor="start">Discuss</text><text x="738" y="342" class="boxText" text-anchor="start">Compare with tutor guidance</text><path d="M844 230 L918 230" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><circle cx="1002" cy="230" r="48" fill="#A73A49"/><text x="1002" y="240" class="num" text-anchor="middle">5</text><text x="954" y="315" class="boxTitle" text-anchor="start">Improve</text><text x="954" y="342" class="boxText" text-anchor="start">Capture actions and lessons</text>
