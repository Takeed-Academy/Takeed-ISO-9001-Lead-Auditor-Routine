<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Documented information control</text><text x="70" y="118" class="subtitle" text-anchor="start">Control QMS documents and records so audit evidence is reliable.</text><rect x="110" y="200" width="270" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="110" y="200" width="270" height="32" rx="14" fill="#092B45"/><text x="245" y="223" class="head" text-anchor="middle">Create / update</text><rect x="440" y="200" width="270" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="440" y="200" width="270" height="32" rx="14" fill="#2F5D7C"/><text x="575" y="223" class="head" text-anchor="middle">Review</text><rect x="770" y="200" width="270" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="770" y="200" width="270" height="32" rx="14" fill="#2C7A7B"/><text x="905" y="223" class="head" text-anchor="middle">Approve</text><rect x="110" y="370" width="270" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="110" y="370" width="270" height="32" rx="14" fill="#B89A25"/><text x="245" y="393" class="head" text-anchor="middle">Publish</text><rect x="440" y="370" width="270" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="440" y="370" width="270" height="32" rx="14" fill="#A73A49"/><text x="575" y="393" class="head" text-anchor="middle">Access control</text><rect x="770" y="370" width="270" height="105" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><rect x="770" y="370" width="270" height="32" rx="14" fill="#15395A"/><text x="905" y="393" class="head" text-anchor="middle">Retain / archive</text>
