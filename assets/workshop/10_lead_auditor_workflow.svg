<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Lead auditor workflow</text><text x="70" y="118" class="subtitle" text-anchor="start">A practical flow for planning, conducting, reporting and following up an ISO 9001 audit.</text><rect x="80" y="190" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="116" cy="238" r="22" fill="#092B45"/><text x="116" y="246" class="head" text-anchor="middle">1</text><text x="152" y="243" class="boxTitle" text-anchor="start">Initiate audit</text><path d="M300 238 L340 238" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="350" y="190" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="386" cy="238" r="22" fill="#092B45"/><text x="386" y="246" class="head" text-anchor="middle">2</text><text x="422" y="243" class="boxTitle" text-anchor="start">Prepare plan</text><path d="M570 238 L610 238" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="620" y="190" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="656" cy="238" r="22" fill="#092B45"/><text x="656" y="246" class="head" text-anchor="middle">3</text><text x="692" y="243" class="boxTitle" text-anchor="start">Conduct opening meeting</text><path d="M840 238 L880 238" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="890" y="190" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="926" cy="238" r="22" fill="#092B45"/><text x="926" y="246" class="head" text-anchor="middle">4</text><text x="962" y="243" class="boxTitle" text-anchor="start">Collect evidence</text><rect x="80" y="380" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="116" cy="428" r="22" fill="#A73A49"/><text x="116" y="436" class="head" text-anchor="middle">5</text><text x="152" y="433" class="boxTitle" text-anchor="start">Evaluate findings</text><path d="M300 428 L340 428" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="350" y="380" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="386" cy="428" r="22" fill="#A73A49"/><text x="386" y="436" class="head" text-anchor="middle">6</text><text x="422" y="433" class="boxTitle" text-anchor="start">Closing meeting</text><path d="M570 428 L610 428" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="620" y="380" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="656" cy="428" r="22" fill="#A73A49"/><text x="656" y="436" class="head" text-anchor="middle">7</text><text x="692" y="433" class="boxTitle" text-anchor="start">Issue report</text><path d="M840 428 L880 428" stroke="#6B7785" stroke-width="3" marker-end="url(#arrow)"/><rect x="890" y="380" width="220" height="95" rx="12" fill="#F8FAFC" stroke="#D7DDE5" /><circle cx="926" cy="428" r="22" fill="#A73A49"/><text x="926" y="436" class="head" text-anchor="middle">8</text><text x="962" y="433" class="boxTitle" text-anchor="start">Follow up</text>
</svg>