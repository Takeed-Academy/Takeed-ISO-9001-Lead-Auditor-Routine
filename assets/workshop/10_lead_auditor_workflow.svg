    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1B2B" flood-opacity="0.16"/></filter>
    <linearGradient id="cover" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#092B45" offset="0"/><stop stop-color="#123C5D" offset="0.6"/><stop stop-color="#0B2F4C" offset="1"/></linearGradient>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#8E4D9F" offset="0"/><stop stop-color="#0E8C87" offset="1"/></linearGradient>
