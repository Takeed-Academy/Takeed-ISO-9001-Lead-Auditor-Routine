<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Audit programme cycle</text><text x="70" y="118" class="subtitle" text-anchor="start">Plan, implement, monitor and improve the audit programme.</text><circle cx="600.0" cy="160.0" r="60" fill="#092B45"/><text x="600.0" y="156.0" class="head" text-anchor="middle">1</text><text x="600.0" y="182.0" class="small" fill="white" text-anchor="middle">Set objectives</text><circle cx="825.1666049839541" cy="255.0" r="60" fill="#2F5D7C"/><text x="825.1666049839541" y="251.0" class="head" text-anchor="middle">2</text><text x="825.1666049839541" y="277.0" class="small" fill="white" text-anchor="middle">Define scope &amp; criteria</text><circle cx="825.1666049839541" cy="445.0" r="60" fill="#2C7A7B"/><text x="825.1666049839541" y="441.0" class="head" text-anchor="middle">3</text><text x="825.1666049839541" y="467.0" class="small" fill="white" text-anchor="middle">Select auditors</text><circle cx="600.0" cy="540.0" r="60" fill="#5B8C5A"/><text x="600.0" y="536.0" class="head" text-anchor="middle">4</text><text x="600.0" y="562.0" class="small" fill="white" text-anchor="middle">Conduct audits</text><circle cx="374.8333950160459" cy="445.0" r="60" fill="#B89A25"/><text x="374.8333950160459" y="441.0" class="head" text-anchor="middle">5</text><text x="374.8333950160459" y="467.0" class="small" fill="white" text-anchor="middle">Report findings</text><circle cx="374.833395016046" cy="255.0" r="60" fill="#A73A49"/><text x="374.833395016046" y="251.0" class="head" text-anchor="middle">6</text><text x="374.833395016046" y="277.0" class="small" fill="white" text-anchor="middle">Follow up actions</text><circle cx="600" cy="350" r="82" fill="#F8FAFC" stroke="#092B45" stroke-width="3"/><text x="600" y="342" class="boxTitle" text-anchor="middle">Audit</text><text x="600" y="370" class="boxTitle" text-anchor="middle">programme</text>
</svg>