<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="70" y="88" class="title" text-anchor="start">Running case — NileTrust Financial</text><text x="70" y="118" class="subtitle" text-anchor="start">Fictitious financial-services organization used consistently across ISO 9001 workshops.</text><rect x="120" y="195" width="420" height="110" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="144" y="240" class="boxTitle" text-anchor="start">Products / services</text><text x="144" y="272" class="label" text-anchor="start">Retail banking, cards, digital channels</text><rect x="600" y="195" width="420" height="110" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="624" y="240" class="boxTitle" text-anchor="start">Locations</text><text x="624" y="272" class="label" text-anchor="start">Head office, branches, contact center</text><rect x="120" y="355" width="420" height="110" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="144" y="400" class="boxTitle" text-anchor="start">Quality risks</text><text x="144" y="432" class="label" text-anchor="start">Complaints, delays, rework, supplier issues</text><rect x="600" y="355" width="420" height="110" rx="14" fill="#F8FAFC" stroke="#D7DDE5" /><text x="624" y="400" class="boxTitle" text-anchor="start">Audit focus</text><text x="624" y="432" class="label" text-anchor="start">Process evidence and customer outcomes</text>
</svg>