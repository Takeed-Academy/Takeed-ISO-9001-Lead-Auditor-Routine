<rect x="30" y="30" width="1140" height="610" rx="18" fill="white" stroke="#D7DDE5" filter="url(#shadow)"/><text x="72" y="88" class="title" text-anchor="start">Structure of ISO 9001:2015</text><text x="72" y="118" class="subtitle" text-anchor="start">Seven management-system clauses and where each is practiced in the workshop book.</text><line x1="72" y1="138" x2="1070" y2="138" stroke="#092B45"/><line x1="72" y1="138" x2="190" y2="138" stroke="#A73A49" stroke-width="7"/><rect x="72" y="170" width="96" height="48" rx="8" fill="#092B45" stroke="#092B45" /><text x="120" y="203" class="num" text-anchor="middle">4</text><rect x="185" y="170" width="720" height="48" rx="8" fill="#F2F4F7" stroke="#D9DEE6" /><text x="205" y="191" class="boxTitle" text-anchor="start">Context</text><text x="205" y="209" class="small" text-anchor="start">External/internal issues, interested parties, QMS scope</text><rect x="950" y="177" width="110" height="34" rx="7" fill="#092B45" stroke="#092B45" /><text x="1005" y="199" class="head" text-anchor="middle">Day 1</text><rect x="72" y="235" width="96" height="48" rx="8" fill="#092B45" stroke="#092B45" /><text x="120" y="268" class="num" text-anchor="middle">5</text><rect x="185" y="235" width="720" height="48" rx="8" fill="#F2F4F7" stroke="#D9DEE6" /><text x="205" y="256" class="boxTitle" text-anchor="start">Leadership</text><text x="205" y="274" class="small" text-anchor="start">Quality policy, roles, customer focus and accountability</text><rect x="950" y="242" width="110" height="34" rx="7" fill="#092B45" stroke="#092B45" /><text x="1005" y="264" class="head" text-anchor="middle">Day 1</text><rect x="72" y="300" width="96" height="48" rx="8" fill="#092B45" stroke="#092B45" /><text x="120" y="333" class="num" text-anchor="middle">6</text><rect x="185" y="300" width="720" height="48" rx="8" fill="#F2F4F7" stroke="#D9DEE6" /><text x="205" y="321" class="boxTitle" text-anchor="start">Planning</text><text x="205" y="339" class="small" text-anchor="start">Risks/opportunities, objectives and change planning</text><rect x="950" y="307" width="110" height="34" rx="7" fill="#092B45" stroke="#092B45" /><text x="1005" y="329" class="head" text-anchor="middle">Day 2</text><rect x="72" y="365" width="96" height="48" rx="8" fill="#455D78" stroke="#455D78" /><text x="120" y="398" class="num" text-anchor="middle">7</text><rect x="185" y="365" width="720" height="48" rx="8" fill="#F2F4F7" stroke="#D9DEE6" /><text x="205" y="386" class="boxTitle" text-anchor="start">Support</text><text x="205" y="404" class="small" text-anchor="start">Resources, competence, awareness, communication, documented information</text><rect x="950" y="372" width="110" height="34" rx="7" fill="#455D78" stroke="#455D78" /><text x="1005" y="394" class="head" text-anchor="middle">Day 2</text><rect x="72" y="430" width="96" height="48" rx="8" fill="#455D78" stroke="#455D78" /><text x="120" y="463" class="num" text-anchor="middle">8</text><rect x="185" y="430" width="720" height="48" rx="8" fill="#F2F4F7" stroke="#D9DEE6" /><text x="205" y="451" class="boxTitle" text-anchor="start">Operation</text><text x="205" y="469" class="small" text-anchor="start">Operational planning, product/service requirements and delivery</text><rect x="950" y="437" width="110" height="34" rx="7" fill="#455D78" stroke="#455D78" /><text x="1005" y="459" class="head" text-anchor="middle">Day 3</text><rect x="72" y="495" width="96" height="48" rx="8" fill="#455D78" stroke="#455D78" /><text x="120" y="528" class="num" text-anchor="middle">9</text><rect x="185" y="495" width="720" height="48" rx="8" fill="#F2F4F7" stroke="#D9DEE6" /><text x="205" y="516" class="boxTitle" text-anchor="start">Performance evaluation</text><text x="205" y="534" class="small" text-anchor="start">Monitoring, analysis, internal audit and management review</text><rect x="950" y="502" width="110" height="34" rx="7" fill="#455D78" stroke="#455D78" /><text x="1005" y="524" class="head" text-anchor="middle">Day 4</text><rect x="72" y="560" width="96" height="48" rx="8" fill="#A73A49" stroke="#A73A49" /><text x="120" y="593" class="num" text-anchor="middle">10</text><rect x="185" y="560" width="720" height="48" rx="8" fill="#F2F4F7" stroke="#D9DEE6" /><text x="205" y="581" class="boxTitle" text-anchor="start">Improvement</text><text x="205" y="599" class="small" text-anchor="start">Nonconformity, corrective action and continual improvement</text><rect x="950" y="567" width="110" height="34" rx="7" fill="#A73A49" stroke="#A73A49" /><text x="1005" y="589" class="head" text-anchor="middle">Day 4</text>
</svg>